<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MTS Mobile Content Engine</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">MTS Żory</p>
      <h1>Brief do promptu</h1>
      <p class="lead">Mobilny formularz do zebrania briefu i przygotowania idealnego promptu do wklejenia w Custom GPT. Make służy tylko jako opcjonalne archiwum briefu.</p>
    </section>

    <section class="card">
      <label>Typ materiału
        <select id="workflow_type">
          <option value="article_to_social">Artykuł</option>
          <option value="post_facebook">Post Facebook</option>
          <option value="post_instagram">Post Instagram</option>
          <option value="event_brief">Relacja</option>
          <option value="newsletter">Newsletter</option>
          <option value="graphic_brief">Brief graficzny</option>
          <option value="campaign_brief">Kampania</option>
          <option value="marketing_material">Materiał marketingowy</option>
          <option value="pt_br_adaptation">Wersja PT-BR</option>
        </select>
      </label>
      <fieldset class="group">
        <legend>Kanały publikacji</legend>
        <label class="check"><input type="checkbox" id="channel_www"> Strona www</label>
        <label class="check"><input type="checkbox" id="channel_facebook"> Facebook</label>
        <label class="check"><input type="checkbox" id="channel_instagram"> Instagram</label>
        <label class="check"><input type="checkbox" id="channel_stories"> Stories</label>
        <label class="check"><input type="checkbox" id="channel_newsletter"> Newsletter</label>
        <label class="check"><input type="checkbox" id="channel_canva"> Canva / grafika</label>
        <label class="check"><input type="checkbox" id="channel_inne"> Inne</label>
      </fieldset>
      <label>Cel materiału <textarea id="title" rows="3" placeholder="Po co ma powstać materiał? Jaki efekt chcemy osiągnąć?"></textarea></label>
      <label>Link źródłowy <input id="source_url" type="url" placeholder="Adres materiału źródłowego lub pusty"></label>
      <label>Najważniejsze fakty <textarea id="facts" rows="5" placeholder="Podaj konkretne fakty, liczby, daty, cytaty lub braki"></textarea></label>
      <label>Osoby / zawodniczki / drużyny <input id="people" type="text" placeholder="Oddziel przecinkami"></label>
      <label>Ton komunikacji
        <select id="tone">
          <option>newsowy</option>
          <option>emocjonalny</option>
          <option>spokojny</option>
          <option>premium</option>
          <option>szybki komunikat</option>
          <option>mocna humanizacja</option>
        </select>
      </label>
      <label>Deadline / kiedy materiał ma być potrzebny <input id="date" type="date"></label>
      <label>Dodatkowe wymagania <textarea id="notes" rows="4" placeholder="Np. długość, CTA, zakazy, styl, format, uwagi do grafiki"></textarea></label>
      <fieldset class="group">
        <legend>Język materiału</legend>
        <label class="check"><input type="checkbox" id="lang_pl" checked> Polski</label>
        <label class="check"><input type="checkbox" id="lang_ptbr"> PT-BR</label>
        <label class="check"><input type="checkbox" id="need_json"> Potrzebny JSON do Make</label>
      </fieldset>
      <label>Webhook Make (opcjonalnie) <input id="webhook_url" type="url" placeholder="https://HOOK_URL_Z_MAKE"></label>
      <p class="hint">Webhook Make jest używany tylko do tej wysyłki i nie jest zapisywany.</p>
      <div class="buttons">
        <button id="generate">Wygeneruj prompt do Custom GPT</button>
        <button id="copy">Kopiuj prompt</button>
        <button id="send">Wyślij brief do Make</button>
        <button id="clear" class="secondary">Wyczyść formularz</button>
      </div>
      <p id="status" class="status"></p>
      <label>Gotowy prompt
        <textarea id="output" rows="16" readonly placeholder="Tutaj pojawi się gotowy prompt do wklejenia do Custom GPT."></textarea>
      </label>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
